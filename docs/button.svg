<svg xmlns="http://www.w3.org/2000/svg" width="300" height="58" viewBox="0 0 300 58">
  <defs>
    <!-- Muted peach → dusty rose -->
    <linearGradient id="bg" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a9828a"/>
      <stop offset="100%" stop-color="#f5e0dc"/>
    </linearGradient>

    <!-- Border -->
    <linearGradient id="bdg" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7a4858" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c07888" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Soft depth for the icon -->
    <filter id="depth" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#4a1828" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="300" height="58" rx="11" fill="url(#bg)"/>
  <rect x=".5" y=".5" width="299" height="57" rx="10.5" fill="none"
        stroke="url(#bdg)" stroke-width="1"/>

  <g filter="url(#depth)">
    <path d="M35 18 L35 32 M29 26 L35 33 L41 26 M28 40 L42 40"
          stroke="#3a1020" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <text x="58" y="27"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-size="13.5" font-weight="600" fill="#2e1018" letter-spacing="0.02em">Download</text>
  <text x="58" y="41"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif"
        font-size="10" fill="#6a3840" letter-spacing="0.05em">auto-detects your device</text>
</svg>
